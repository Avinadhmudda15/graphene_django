{% extends "base.html" %}
{% block title %}Create User — Graphene Trace{% endblock %}
{% block page_title %}Create New User{% endblock %}
{% block content %}
<div class="panel" style="max-width:560px">
  <div class="panel-header"><h3>New User Account</h3></div>
  <form method="post" action="{% url 'accounts:create_user' %}" style="padding:20px">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" class="form-control" required>
      </div>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" class="form-control" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" class="form-control" required minlength="6">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select name="role" class="form-control" id="roleSelect" onchange="toggleFields()">
        <option value="patient">Patient</option>
        <option value="clinician">Clinician</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div id="patientFields">
      <div class="form-group">
        <label>Assign to Clinician</label>
        <select name="clinician_id" class="form-control">
          <option value="">— None —</option>
          {% for c in clinicians %}
          <option value="{{ c.pk }}">{{ c.get_full_name|default:c.username }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div id="clinicianFields" style="display:none">
      <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" class="form-control">
      </div>
      <div class="form-group">
        <label>License Number</label>
        <input type="text" name="license_number" class="form-control">
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button type="submit" class="btn btn-primary">Create User</button>
      <a href="{% url 'accounts:user_list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
function toggleFields(){
  const r = document.getElementById('roleSelect').value;
  document.getElementById('patientFields').style.display   = r==='patient'   ? '' : 'none';
  document.getElementById('clinicianFields').style.display = r==='clinician' ? '' : 'none';
}
</script>
{% endblock %}
